<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tetris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            touch-action: none;
        }
        canvas {
            border: 4px solid #334155;
            background-color: #1e293b;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .controls-btn {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-white font-sans">

    <div class="flex flex-col md:flex-row gap-8 items-start justify-center p-4">
        <!-- 왼쪽: 게임 보드 -->
        <div class="relative">
            <canvas id="tetris" width="300" height="600"></canvas>
            
            <!-- 게임 오버 오버레이 -->
            <div id="game-over" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center text-center">
                <h2 class="text-4xl font-bold mb-4 text-red-500">GAME OVER</h2>
                <p id="final-score-display" class="text-xl mb-6">Score: 0</p>
                <button onclick="startGame()" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-full font-bold transition-all">다시 시작</button>
            </div>

            <!-- 시작 화면 -->
            <div id="start-screen" class="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center text-center">
                <h1 class="text-5xl font-extrabold mb-8 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">TETRIS</h1>
                <button onclick="startGame()" class="px-10 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 rounded-xl text-xl font-bold shadow-lg transition-transform active:scale-95">게임 시작</button>
                <p class="mt-6 text-slate-400 text-sm italic">화살표 키로 조작하거나<br>하단 버튼을 사용하세요.</p>
            </div>
        </div>

        <!-- 오른쪽: 정보 창 -->
        <div class="flex flex-col gap-6 w-full md:w-48">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl">
                <h3 class="text-slate-400 text-xs font-bold uppercase mb-2">Next</h3>
                <canvas id="next" width="120" height="120" class="mx-auto border-none bg-transparent"></canvas>
            </div>

            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl">
                <h3 class="text-slate-400 text-xs font-bold uppercase mb-1">Score</h3>
                <div id="score" class="text-3xl font-mono font-bold text-blue-400">00000</div>
            </div>

            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl">
                <h3 class="text-slate-400 text-xs font-bold uppercase mb-1">Level</h3>
                <div id="level" class="text-3xl font-mono font-bold text-purple-400">1</div>
            </div>

            <div class="hidden md:block text-slate-500 text-xs">
                <p>← → : 이동</p>
                <p>↑ : 회전</p>
                <p>↓ : 하강</p>
                <p>Space : 즉시 하강</p>
            </div>
        </div>
    </div>

    <!-- 모바일 컨트롤러 -->
    <div class="grid grid-cols-3 gap-2 mt-8 md:hidden">
        <div></div>
        <button onmousedown="handleAction('up')" class="controls-btn w-16 h-16 bg-slate-700 rounded-full flex items-center justify-center text-2xl active:bg-blue-600">↻</button>
        <div></div>
        <button onmousedown="handleAction('left')" class="controls-btn w-16 h-16 bg-slate-700 rounded-full flex items-center justify-center text-2xl active:bg-blue-600">←</button>
        <button onmousedown="handleAction('down')" class="controls-btn w-16 h-16 bg-slate-700 rounded-full flex items-center justify-center text-2xl active:bg-blue-600">↓</button>
        <button onmousedown="handleAction('right')" class="controls-btn w-16 h-16 bg-slate-700 rounded-full flex items-center justify-center text-2xl active:bg-blue-600">→</button>
        <div></div>
        <button onmousedown="handleAction('space')" class="controls-btn col-span-1 w-full h-16 bg-indigo-700 rounded-xl flex items-center justify-center text-lg font-bold active:bg-indigo-500">DROP</button>
    </div>

    <script>
        /**
         * 사운드 엔진 (Web Audio API)
         */
        const AudioEngine = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;

                switch(type) {
                    case 'move':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(150, now);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                        osc.start();
                        osc.stop(now + 0.05);
                        break;
                    case 'rotate':
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.exponentialRampToValueAtTime(450, now + 0.05);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        osc.start();
                        osc.stop(now + 0.1);
                        break;
                    case 'clear':
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(500, now);
                        osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                        osc.start();
                        osc.stop(now + 0.3);
                        break;
                    case 'drop':
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(100, now);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                        osc.start();
                        osc.stop(now + 0.1);
                        break;
                    case 'gameover':
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(300, now);
                        osc.frequency.linearRampToValueAtTime(50, now + 1);
                        gain.gain.setValueAtTime(0.2, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
                        osc.start();
                        osc.stop(now + 1);
                        break;
                }
            }
        };

        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');

        context.scale(30, 30);
        nextContext.scale(30, 30);

        // 테트리미노 블록 설정
        function createPiece(type) {
            if (type === 'I') {
                return [
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                    [0, 1, 0, 0],
                ];
            } else if (type === 'L') {
                return [
                    [0, 2, 0],
                    [0, 2, 0],
                    [0, 2, 2],
                ];
            } else if (type === 'J') {
                return [
                    [0, 3, 0],
                    [0, 3, 0],
                    [3, 3, 0],
                ];
            } else if (type === 'O') {
                return [
                    [4, 4],
                    [4, 4],
                ];
            } else if (type === 'Z') {
                return [
                    [5, 5, 0],
                    [0, 5, 5],
                    [0, 0, 0],
                ];
            } else if (type === 'S') {
                return [
                    [0, 6, 6],
                    [6, 6, 0],
                    [0, 0, 0],
                ];
            } else if (type === 'T') {
                return [
                    [0, 7, 0],
                    [7, 7, 7],
                    [0, 0, 0],
                ];
            }
        }

        const colors = [
            null,
            '#22d3ee', // I - Cyan
            '#fb923c', // L - Orange
            '#60a5fa', // J - Blue
            '#facc15', // O - Yellow
            '#f87171', // Z - Red
            '#4ade80', // S - Green
            '#c084fc', // T - Purple
        ];

        // 보드 생성 (10x20)
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        // 블록 그리기
        function drawMatrix(matrix, offset, ctx = context) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // 블록 몸체
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // 하이라이트/입체감
                        ctx.lineWidth = 0.05;
                        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            // 배경 지우기
            context.fillStyle = '#1e293b';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // 가이드라인 (격자)
            context.strokeStyle = 'rgba(255,255,255,0.02)';
            context.lineWidth = 0.05;
            for(let i=0; i<10; i++) context.strokeRect(i, 0, 0.1, 20);
            for(let i=0; i<20; i++) context.strokeRect(0, i, 10, 0.1);

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
            
            // 다음 블록 그리기
            nextContext.fillStyle = '#1e293b';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            drawMatrix(nextPiece, {x: 1, y: 1}, nextContext);
        }

        // 충돌 체크
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // 아레나에 플레이어 블록 병합
        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        // 줄 제거 및 점수 계산
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 100;
                rowCount *= 2;
                AudioEngine.play('clear');
            }
            updateScore();
        }

        // 블록 회전
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [
                        matrix[x][y],
                        matrix[y][x],
                    ] = [
                        matrix[y][x],
                        matrix[x][y],
                    ];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
                AudioEngine.play('drop');
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            } else {
                AudioEngine.play('move');
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            AudioEngine.play('rotate');
        }

        let nextPiece = null;
        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (nextPiece === null) {
                nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            }
            
            player.matrix = nextPiece;
            nextPiece = createPiece(pieces[pieces.length * Math.random() | 0]);
            
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) -
                           (player.matrix[0].length / 2 | 0);

            if (collide(arena, player)) {
                // 게임 오버
                gameOver();
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score.toString().padStart(5, '0');
            const newLevel = Math.floor(player.score / 1000) + 1;
            if (newLevel !== player.level) {
                player.level = newLevel;
                document.getElementById('level').innerText = player.level;
            }
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('final-score-display').innerText = `최종 점수: ${player.score}`;
            AudioEngine.play('gameover');
        }

        function startGame() {
            AudioEngine.init();
            arena.forEach(row => row.fill(0));
            player.score = 0;
            player.level = 1;
            gameActive = true;
            nextPiece = null;
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            playerReset();
            updateScore();
            update();
        }

        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            level: 1,
        };

        const arena = createMatrix(10, 20);

        let dropCounter = 0;
        let lastTime = 0;
        let gameActive = false;

        function update(time = 0) {
            if (!gameActive) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            // 레벨에 따른 속도 증가
            const dropInterval = Math.max(100, 1000 - (player.level - 1) * 100);
            
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        // 키보드 조작
        document.addEventListener('keydown', event => {
            if (!gameActive) return;
            
            if (event.keyCode === 37) { // Left
                playerMove(-1);
            } else if (event.keyCode === 39) { // Right
                playerMove(1);
            } else if (event.keyCode === 40) { // Down
                playerDrop();
            } else if (event.keyCode === 38) { // Up (Rotate)
                playerRotate(1);
            } else if (event.keyCode === 32) { // Space (Hard Drop)
                while(!collide(arena, player)) {
                    player.pos.y++;
                }
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
                AudioEngine.play('drop');
            }
        });

        // 모바일/버튼 핸들러
        function handleAction(action) {
            if (!gameActive) return;
            AudioEngine.init(); // 사용자 상호작용으로 오디오 컨텍스트 활성화

            switch(action) {
                case 'left': playerMove(-1); break;
                case 'right': playerMove(1); break;
                case 'down': playerDrop(); break;
                case 'up': playerRotate(1); break;
                case 'space':
                    while(!collide(arena, player)) {
                        player.pos.y++;
                    }
                    player.pos.y--;
                    merge(arena, player);
                    playerReset();
                    arenaSweep();
                    updateScore();
                    AudioEngine.play('drop');
                    break;
            }
        }

        // 초기 화면 그리기
        draw();
    </script>
</body>
</html>
